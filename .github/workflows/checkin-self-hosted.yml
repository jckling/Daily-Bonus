name: Daily Bonus (Self-hosted)

on:
  schedule:
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: self-hosted
    timeout-minutes: 10

    env:
      V2EX_COOKIES: ${{ secrets.V2EX_COOKIES }}
      BILIBILI_COOKIES: ${{ secrets.BILIBILI_COOKIES }}
      YAMIBO_COOKIES: ${{ secrets.YAMIBO_COOKIES }}
      YURIFANS_EMAIL: ${{ secrets.YURIFANS_EMAIL }}
      YURIFANS_PASSWORD: ${{ secrets.YURIFANS_PASSWORD }}
      PICA_USERNAME: ${{ secrets.PICA_USERNAME }}
      PICA_PASSWORD: ${{ secrets.PICA_PASSWORD }}
      UMA_COOKIES: ${{ secrets.UMA_COOKIES }}
      FFXIV_USERNAME: ${{ secrets.FFXIV_USERNAME }}
      FFXIV_PASSWORD: ${{ secrets.FFXIV_PASSWORD }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_USER_ID: ${{ secrets.TG_USER_ID }}

    steps:
      - name: Checkout repo
        run: |
          rm -rf * .[!.]* 2>/dev/null
          git clone --depth 1 https://github.com/${{ github.repository }}.git .
          git checkout ${{ github.sha }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Add uv to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync

      - name: Check-in
        run: uv run python ./message.py
